{% load static %}
<!DOCTYPE html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SKYsafe is a company that provides a safe and secure environment for the Airport." />
    <title>SKYsafe - Sign Up</title>
    <link href="{% static 'css/signup.css' %}" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="form-wrapper">
        <form action="{% url 'signup' %}" method="post" class="skysafe-form" enctype="multipart/form-data">
            {% csrf_token %}
            <h2>Join SKYsafe</h2>
            <p>Create your account to get started.</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="Your phone number" required>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="radio-container">
                    <input type="radio" id="male" name="gender" value="Male" required> <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="Female"> <label for="female">Female</label>
                    <input type="radio" id="other" name="gender" value="Other"> <label for="other">Other</label>
                </div>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="123 Sky Harbor Blvd" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="job-title">Job Title</label>
                    <select name="job-title" id="job-title" required>
                        <option value="" disabled selected>Select your job title</option>
                        <option value="Security Guard">Security</option>
                        <option value="IT">IT</option>
                        <option value="Pilot">Pilot</option>
                        <option value="Manager">Manager</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="nationality">Nationality</label>
                    <select name="nationality" id="nationality" required>
                        <option value="" disabled selected>Select your nationality</option>
                        <option value="Egypt">Egyptian</option>
                        <option value="Sudan">Sudanese</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="resume">CV/Resume</label>
                <input type="file" id="resume" name="resume">
            </div>

            <div class="form-group">
                <label for="national-id">National ID</label>
                <input type="file" id="national-id" name="national-id">
            </div>

            <div class="form-group">
                <label for="photo">Your Photo</label>
                <input type="file" id="photo" name="photo" accept="image/*">
            </div>

            <hr class="divider">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required minlength="3" maxlength="20">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="8" maxlength="20">
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required minlength="8" maxlength="20">
            </div>

            <button type="submit">Sign Up</button>
            <p class="switch-form-link">
                Already have an account? <a href="{% url 'login' %}">Sign in now</a>
            </p>
        </form>
    </div>
</body>
</html>
