{% load static %}
<!DOCTYPE html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SKYsafe Admin Login - Restricted Access" />
    <link href="{% static 'css/login.css' %}" rel="stylesheet"/>
    <title>SKYsafe - Admin Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, #e53935, #b71c1c);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .lock-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
        }
        .alert-error {
            background-color: #fdecea !important;
            color: #c0392b !important;
            border: 1px solid #f5c6cb !important;
        }
        .alert-success {
            background-color: #eafaf1 !important;
            color: #1e8449 !important;
            border: 1px solid #a9dfbf !important;
        }
    </style>
</head>
<body>
    <div class="form-wrapper">
        <form action="{% url 'admin_login' %}" method="post" class="skysafe-form">
            {% csrf_token %}
            <div class="lock-icon">🔒</div>
            <span class="admin-badge">Manager Only</span>
            <h2>Manager Access</h2>
            <p>This area is restricted to authorised managers only.</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if 'error' in message.tags %}alert-error{% else %}alert-success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <div class="form-group">
                <label for="username">Manager Username</label>
                <input type="text" id="username" name="username" placeholder="Enter manager username" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Manager Password</label>
                <input type="password" id="password" name="password" placeholder="Enter manager password" required>
            </div>

            <button type="submit">Access Dashboard</button>
            <p class="switch-form-link">
                Not a manager? <a href="{% url 'login' %}">Go to Employee Login</a>
            </p>
        </form>
    </div>
</body>
</html>
